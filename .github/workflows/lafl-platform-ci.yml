name: LAFL Platform CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run Gradle Tests
        run: gradle -p lafl-platform test

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      gateway_route: ${{ steps.deploy-services.outputs.gateway_route }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4

      - name: Build Artifacts
        run: gradle -p lafl-platform clean build -x test

      - name: Install CF CLI
        run: |
          curl -L "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=v8&source=github" | tar -zx
          sudo mv cf8 /usr/local/bin/cf
          cf --version

      - name: Authenticate to Cloud Foundry
        run: |
          cf api "${{ secrets.CF_API }}"
          cf auth "${{ secrets.CF_USERNAME }}" "${{ secrets.CF_PASSWORD }}"
          cf target -o "${{ secrets.CF_ORG }}" -s "${{ secrets.CF_SPACE }}"

      - name: Deploy Services In Startup Order
        id: deploy-services
        run: |
          set -euo pipefail

          route_of() {
            cf app "$1" | sed -n 's/^routes:[[:space:]]*//p' | tr -d '\r' | awk '{print $1}'
          }

          kafka_brokers="${{ secrets.KAFKA_BROKERS }}"
          if [ -z "$kafka_brokers" ] || [[ "$kafka_brokers" == localhost* ]]; then
            echo "KAFKA_BROKERS secret is missing or points to localhost. Refusing deployment."
            exit 1
          fi
          redis_host="${{ secrets.REDIS_HOST }}"
          redis_port="${{ secrets.REDIS_PORT }}"
          mail_host="${{ secrets.MAIL_HOST }}"
          mail_port="${{ secrets.MAIL_PORT }}"
          mail_username="${{ secrets.MAIL_USERNAME }}"
          mail_password="${{ secrets.MAIL_PASSWORD }}"
          mail_smtp_auth="${{ secrets.MAIL_SMTP_AUTH }}"
          mail_smtp_starttls="${{ secrets.MAIL_SMTP_STARTTLS }}"
          mail_from="${{ secrets.MAIL_FROM }}"
          mail_to="${{ secrets.MAIL_TO }}"
          if [ -z "$mail_host" ] || [ -z "$mail_port" ] || [ -z "$mail_from" ] || [ -z "$mail_to" ]; then
            echo "MAIL_HOST, MAIL_PORT, MAIL_FROM, and MAIL_TO secrets are required for notification email delivery."
            exit 1
          fi

          # config-server
          cf push config-server -f lafl-platform/config-server/manifest.yml --no-start
          cf set-env config-server SPRING_DATASOURCE_URL "${{ secrets.DB_URL }}"
          cf set-env config-server SPRING_DATASOURCE_USERNAME "${{ secrets.DB_USER }}"
          cf set-env config-server SPRING_DATASOURCE_PASSWORD "${{ secrets.DB_PASS }}"
          cf set-env config-server JWT_SECRET "${{ secrets.JWT_SECRET }}"
          cf set-env config-server KAFKA_BROKERS "$kafka_brokers"
          if [ -n "$redis_host" ]; then
            cf set-env config-server REDIS_HOST "$redis_host"
          fi
          if [ -n "$redis_port" ]; then
            cf set-env config-server REDIS_PORT "$redis_port"
          fi
          cf start config-server || { cf logs config-server --recent; exit 1; }

          # eureka-server
          cf push eureka-server -f lafl-platform/eureka-server/manifest.yml --no-start
          cf start eureka-server || { cf logs eureka-server --recent; exit 1; }
          eureka_route="$(cf app eureka-server | sed -n 's/^routes:[[:space:]]*//p' | tr -d '\r' | awk '{print $1}')"
          if [ -z "$eureka_route" ]; then
            echo "Unable to resolve eureka-server route from cf app output."
            exit 1
          fi
          eureka_url="https://${eureka_route}/eureka/"

          # shipment-service
          cf push shipment-service -f lafl-platform/shipment-service/manifest.yml --no-start
          cf unset-env shipment-service EUREKA_INSTANCE_HOSTNAME || true
          cf unset-env shipment-service EUREKA_INSTANCE_SECURE_PORT_ENABLED || true
          cf unset-env shipment-service EUREKA_INSTANCE_SECURE_PORT || true
          cf unset-env shipment-service EUREKA_INSTANCE_NON_SECURE_PORT_ENABLED || true
          cf set-env shipment-service SPRING_DATASOURCE_URL "${{ secrets.DB_URL }}"
          cf set-env shipment-service SPRING_DATASOURCE_USERNAME "${{ secrets.DB_USER }}"
          cf set-env shipment-service SPRING_DATASOURCE_PASSWORD "${{ secrets.DB_PASS }}"
          cf set-env shipment-service JWT_SECRET "${{ secrets.JWT_SECRET }}"
          cf set-env shipment-service SPRING_CLOUD_CONFIG_ENABLED false
          cf set-env shipment-service SPRING_KAFKA_BOOTSTRAP_SERVERS "$kafka_brokers"
          cf set-env shipment-service KAFKA_BOOTSTRAP_SERVERS "$kafka_brokers"
          cf set-env shipment-service SPRING_CACHE_TYPE simple
          if [ -n "$redis_host" ]; then
            cf set-env shipment-service SPRING_DATA_REDIS_HOST "$redis_host"
          fi
          if [ -n "$redis_port" ]; then
            cf set-env shipment-service SPRING_DATA_REDIS_PORT "$redis_port"
          fi
          cf set-env shipment-service EUREKA_CLIENT_SERVICEURL_DEFAULTZONE "$eureka_url"
          cf set-env shipment-service EUREKA_INSTANCE_PREFER_IP_ADDRESS false
          cf start shipment-service || { cf logs shipment-service --recent; exit 1; }
          shipment_route="$(route_of shipment-service)"
          if [ -z "$shipment_route" ]; then
            echo "Unable to resolve shipment-service route from cf app output."
            exit 1
          fi

          # user-service
          cf push user-service -f lafl-platform/user-service/manifest.yml --no-start
          cf unset-env user-service EUREKA_INSTANCE_HOSTNAME || true
          cf unset-env user-service EUREKA_INSTANCE_SECURE_PORT_ENABLED || true
          cf unset-env user-service EUREKA_INSTANCE_SECURE_PORT || true
          cf unset-env user-service EUREKA_INSTANCE_NON_SECURE_PORT_ENABLED || true
          cf set-env user-service SPRING_DATASOURCE_URL "${{ secrets.DB_URL }}"
          cf set-env user-service SPRING_DATASOURCE_USERNAME "${{ secrets.DB_USER }}"
          cf set-env user-service SPRING_DATASOURCE_PASSWORD "${{ secrets.DB_PASS }}"
          cf set-env user-service JWT_SECRET "${{ secrets.JWT_SECRET }}"
          cf set-env user-service SPRING_CLOUD_CONFIG_ENABLED false
          cf set-env user-service SPRING_KAFKA_BOOTSTRAP_SERVERS "$kafka_brokers"
          cf set-env user-service KAFKA_BOOTSTRAP_SERVERS "$kafka_brokers"
          cf set-env user-service EUREKA_CLIENT_SERVICEURL_DEFAULTZONE "$eureka_url"
          cf set-env user-service EUREKA_INSTANCE_PREFER_IP_ADDRESS false
          cf start user-service || { cf logs user-service --recent; exit 1; }
          user_route="$(route_of user-service)"
          if [ -z "$user_route" ]; then
            echo "Unable to resolve user-service route from cf app output."
            exit 1
          fi

          # quote-service
          cf push quote-service -f lafl-platform/quote-service/manifest.yml --no-start
          cf unset-env quote-service EUREKA_INSTANCE_HOSTNAME || true
          cf unset-env quote-service EUREKA_INSTANCE_SECURE_PORT_ENABLED || true
          cf unset-env quote-service EUREKA_INSTANCE_SECURE_PORT || true
          cf unset-env quote-service EUREKA_INSTANCE_NON_SECURE_PORT_ENABLED || true
          cf set-env quote-service SPRING_DATASOURCE_URL "${{ secrets.DB_URL }}"
          cf set-env quote-service SPRING_DATASOURCE_USERNAME "${{ secrets.DB_USER }}"
          cf set-env quote-service SPRING_DATASOURCE_PASSWORD "${{ secrets.DB_PASS }}"
          cf set-env quote-service JWT_SECRET "${{ secrets.JWT_SECRET }}"
          cf set-env quote-service SPRING_CLOUD_CONFIG_ENABLED false
          cf set-env quote-service SPRING_KAFKA_BOOTSTRAP_SERVERS "$kafka_brokers"
          cf set-env quote-service KAFKA_BOOTSTRAP_SERVERS "$kafka_brokers"
          cf set-env quote-service EUREKA_CLIENT_SERVICEURL_DEFAULTZONE "$eureka_url"
          cf set-env quote-service EUREKA_INSTANCE_PREFER_IP_ADDRESS false
          cf start quote-service || { cf logs quote-service --recent; exit 1; }
          quote_route="$(route_of quote-service)"
          if [ -z "$quote_route" ]; then
            echo "Unable to resolve quote-service route from cf app output."
            exit 1
          fi

          # notification-service
          cf push notification-service -f lafl-platform/notification-service/manifest.yml --no-start
          cf unset-env notification-service EUREKA_INSTANCE_HOSTNAME || true
          cf unset-env notification-service EUREKA_INSTANCE_SECURE_PORT_ENABLED || true
          cf unset-env notification-service EUREKA_INSTANCE_SECURE_PORT || true
          cf unset-env notification-service EUREKA_INSTANCE_NON_SECURE_PORT_ENABLED || true
          cf set-env notification-service SPRING_CLOUD_CONFIG_ENABLED false
          cf set-env notification-service SPRING_KAFKA_BOOTSTRAP_SERVERS "$kafka_brokers"
          cf set-env notification-service KAFKA_BOOTSTRAP_SERVERS "$kafka_brokers"
          cf set-env notification-service SPRING_MAIL_HOST "$mail_host"
          cf set-env notification-service SPRING_MAIL_PORT "$mail_port"
          cf set-env notification-service MAIL_FROM "$mail_from"
          cf set-env notification-service MAIL_TO "$mail_to"
          if [ -n "$mail_username" ]; then
            cf set-env notification-service SPRING_MAIL_USERNAME "$mail_username"
          fi
          if [ -n "$mail_password" ]; then
            cf set-env notification-service SPRING_MAIL_PASSWORD "$mail_password"
          fi
          if [ -n "$mail_smtp_auth" ]; then
            cf set-env notification-service MAIL_SMTP_AUTH "$mail_smtp_auth"
          fi
          if [ -n "$mail_smtp_starttls" ]; then
            cf set-env notification-service MAIL_SMTP_STARTTLS "$mail_smtp_starttls"
          fi
          cf set-env notification-service EUREKA_CLIENT_SERVICEURL_DEFAULTZONE "$eureka_url"
          cf set-env notification-service EUREKA_INSTANCE_PREFER_IP_ADDRESS false
          cf start notification-service || { cf logs notification-service --recent; exit 1; }
          notification_route="$(route_of notification-service)"
          if [ -z "$notification_route" ]; then
            echo "Unable to resolve notification-service route from cf app output."
            exit 1
          fi

          # gateway (must be last so backend routes can be wired explicitly)
          cf push gateway -f lafl-platform/gateway/manifest.yml --no-start
          cf unset-env gateway SPRING_CLOUD_GATEWAY_ROUTES_0_URI || true
          cf unset-env gateway SPRING_CLOUD_GATEWAY_ROUTES_1_URI || true
          cf unset-env gateway SPRING_DATASOURCE_URL || true
          cf unset-env gateway SPRING_DATASOURCE_USERNAME || true
          cf unset-env gateway SPRING_DATASOURCE_PASSWORD || true
          cf unset-env gateway KAFKA_BOOTSTRAP_SERVERS || true
          cf set-env gateway SPRING_CLOUD_CONFIG_ENABLED false
          cf set-env gateway JWT_SECRET "${{ secrets.JWT_SECRET }}"
          cf set-env gateway EUREKA_CLIENT_SERVICEURL_DEFAULTZONE "$eureka_url"
          if [ -n "$redis_host" ]; then
            cf set-env gateway SPRING_DATA_REDIS_HOST "$redis_host"
          fi
          if [ -n "$redis_port" ]; then
            cf set-env gateway SPRING_DATA_REDIS_PORT "$redis_port"
          fi
          cf set-env gateway SHIPMENT_SERVICE_URI "https://${shipment_route}"
          cf set-env gateway USER_SERVICE_URI "https://${user_route}"
          cf set-env gateway QUOTE_SERVICE_URI "https://${quote_route}"
          cf set-env gateway NOTIFICATION_SERVICE_URI "https://${notification_route}"
          cf start gateway || { cf logs gateway --recent; exit 1; }

          gateway_route="$(route_of gateway)"
          if [ -z "$gateway_route" ]; then
            echo "Unable to resolve gateway route from cf app output."
            exit 1
          fi
          echo "gateway_route=$gateway_route" >> "$GITHUB_OUTPUT"

  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Smoke Test Gateway /api/health
        run: |
          set -euo pipefail
          route="${{ needs.deploy.outputs.gateway_route }}"
          if [ -z "$route" ]; then
            echo "Gateway route output is empty."
            exit 1
          fi

          for attempt in $(seq 1 20); do
            status="$(curl -s -o /tmp/gateway-health.json -w "%{http_code}" "https://${route}/api/health" || true)"
            if [ "$status" = "200" ]; then
              cat /tmp/gateway-health.json
              break
            fi
            sleep 10
          done

          if [ "${status:-}" != "200" ]; then
            echo "Gateway health check failed."
            cat /tmp/gateway-health.json || true
            exit 1
          fi

          base="https://${route}"
          tracking_status="$(curl -s -o /tmp/tracking.json -w "%{http_code}" "$base/api/v1/shipments/track?reference=LAFL-24017" || true)"
          if [ "$tracking_status" -ge 500 ]; then
            echo "Tracking endpoint returned server error."
            cat /tmp/tracking.json || true
            exit 1
          fi

          email="smoke+$(date +%s)@lafl.com"
          signup_status="$(curl -s -o /tmp/signup.json -w "%{http_code}" -X POST "$base/api/v1/auth/signup" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"Smoke Test\",\"email\":\"${email}\",\"company\":\"LAFL\",\"password\":\"Password123\"}" || true)"
          if [ "$signup_status" != "201" ]; then
            echo "Signup smoke test failed."
            cat /tmp/signup.json || true
            exit 1
          fi

          echo "Smoke tests passed."
