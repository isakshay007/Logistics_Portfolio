name: LAFL Platform CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Run Gradle Tests
        run: gradle -p lafl-platform test

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      gateway_route: ${{ steps.deploy-services.outputs.gateway_route }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4

      - name: Build Artifacts
        run: gradle -p lafl-platform clean build -x test

      - name: Install CF CLI
        run: |
          curl -L "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=v8&source=github" | tar -zx
          sudo mv cf8 /usr/local/bin/cf
          cf --version

      - name: Authenticate to Cloud Foundry
        run: |
          cf api "${{ secrets.CF_API }}"
          cf auth "${{ secrets.CF_USERNAME }}" "${{ secrets.CF_PASSWORD }}"
          cf target -o "${{ secrets.CF_ORG }}" -s "${{ secrets.CF_SPACE }}"

      - name: Deploy Services In Startup Order
        id: deploy-services
        env:
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.DB_PASS }}
          KAFKA_BOOTSTRAP_SERVERS: ${{ secrets.KAFKA_BROKERS }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
        run: |
          set -euo pipefail
          cd lafl-platform

          deploy_module() {
            local module="$1"
            cf push "$module" -f "$module/manifest.yml" \
              --var SPRING_DATASOURCE_PASSWORD="$SPRING_DATASOURCE_PASSWORD" \
              --var KAFKA_BOOTSTRAP_SERVERS="$KAFKA_BOOTSTRAP_SERVERS" \
              --var JWT_SECRET="$JWT_SECRET"
          }

          deploy_module config-server
          deploy_module eureka-server
          deploy_module gateway
          deploy_module shipment-service
          deploy_module user-service
          deploy_module quote-service
          deploy_module notification-service

          gateway_route="$(cf app gateway | awk '/routes:/{print $2; exit}' | tr -d '\r')"
          if [ -z "$gateway_route" ]; then
            echo "Unable to resolve gateway route from cf app output."
            exit 1
          fi
          echo "gateway_route=$gateway_route" >> "$GITHUB_OUTPUT"

  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Smoke Test Gateway /api/health
        run: |
          set -euo pipefail
          route="${{ needs.deploy.outputs.gateway_route }}"
          if [ -z "$route" ]; then
            echo "Gateway route output is empty."
            exit 1
          fi

          for attempt in $(seq 1 20); do
            status="$(curl -s -o /tmp/gateway-health.json -w "%{http_code}" "https://${route}/api/health" || true)"
            if [ "$status" = "200" ]; then
              cat /tmp/gateway-health.json
              exit 0
            fi
            sleep 10
          done

          echo "Gateway health check failed."
          cat /tmp/gateway-health.json || true
          exit 1
