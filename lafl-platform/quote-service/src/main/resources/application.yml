server:
  port: 8083

spring:
  application:
    name: quote-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  datasource:
    url: ${DB_URL}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:lafl}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: quote_service
        format_sql: true
  flyway:
    enabled: true
    schemas: quote_service
    default-schema: quote_service
    create-schemas: false
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:${KAFKA_BOOTSTRAP_SERVERS:${kafka.bootstrap-servers:localhost:9092}}}
    producer:
      properties:
        max.block.ms: ${KAFKA_MAX_BLOCK_MS:5000}
        delivery.timeout.ms: ${KAFKA_DELIVERY_TIMEOUT_MS:10000}
        request.timeout.ms: ${KAFKA_REQUEST_TIMEOUT_MS:5000}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true
