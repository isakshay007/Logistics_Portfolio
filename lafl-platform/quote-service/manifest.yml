applications:
  - name: quote-service
    path: build/libs/quote-service-0.1.0-SNAPSHOT.jar
    memory: 768M
    instances: 1
    no-route: true
    buildpacks:
      - java_buildpack
    env:
      CF_APP_NAME: quote-service
      SPRING_PROFILES_ACTIVE: cloud
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASS}
      KAFKA_BOOTSTRAP_SERVERS: ((KAFKA_BOOTSTRAP_SERVERS))
      JWT_SECRET: ((JWT_SECRET))
      JAVA_OPTS: "-XX:ReservedCodeCacheSize=32M -XX:MaxDirectMemorySize=10M -Xss256k -XX:MaxMetaspaceSize=96M -XX:+UseSerialGC"
      JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 17.+ } }'
      JBP_CONFIG_JVM_KILL: 'enabled: false'
