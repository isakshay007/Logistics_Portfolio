server:
  port: 8082

spring:
  application:
    name: user-service
  config:
    import: optional:configserver:http://localhost:8888
  datasource:
    url: ${DB_URL:jdbc:postgresql://db.epvdfxwkqdaaeornsotb.supabase.co:5432/postgres}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:lafl}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: user_service
        format_sql: true
  flyway:
    enabled: true
    schemas: user_service
    default-schema: user_service
    create-schemas: false
  kafka:
    bootstrap-servers: ${kafka.bootstrap-servers:localhost:9092}

jwt:
  ttl-seconds: 86400

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true
