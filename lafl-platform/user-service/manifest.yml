applications:
  - name: user-service
    path: build/libs/user-service-0.1.0-SNAPSHOT.jar
    memory: 512M
    instances: 1
    random-route: true
    buildpacks:
      - java_buildpack
    env:
      CF_APP_NAME: user-service
      SPRING_PROFILES_ACTIVE: cloud
      JAVA_OPTS: "-XX:ReservedCodeCacheSize=32M -XX:MaxDirectMemorySize=10M -Xss256k -XX:+UseSerialGC"
      JBP_CONFIG_OPEN_JDK_JRE: '{ jre: { version: 17.+ } }'
      JBP_CONFIG_JVM_KILL: 'enabled: false'
