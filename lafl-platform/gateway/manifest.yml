applications:
  - name: gateway
    path: build/libs/gateway-0.1.0-SNAPSHOT.jar
    memory: 512M
    instances: 1
    random-route: true
    buildpacks:
      - java_buildpack
    env:
      CF_APP_NAME: gateway
      SPRING_PROFILES_ACTIVE: cloud
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://db.epvdfxwkqdaaeornsotb.supabase.co:5432/postgres
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: ((SPRING_DATASOURCE_PASSWORD))
      KAFKA_BOOTSTRAP_SERVERS: ((KAFKA_BOOTSTRAP_SERVERS))
      JWT_SECRET: ((JWT_SECRET))
