server:
  port: 8084

spring:
  application:
    name: notification-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:${KAFKA_BOOTSTRAP_SERVERS:${kafka.bootstrap-servers:localhost:9092}}}
  mail:
    host: ${SPRING_MAIL_HOST:${MAIL_HOST:mailhog}}
    port: ${SPRING_MAIL_PORT:${MAIL_PORT:1025}}
    username: ${SPRING_MAIL_USERNAME:${MAIL_USERNAME:}}
    password: ${SPRING_MAIL_PASSWORD:${MAIL_PASSWORD:}}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

lafl:
  mail:
    from: ${MAIL_FROM:no-reply@lafl-logistics.com}
    to: ${MAIL_TO:ops@lafl-logistics.com}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
