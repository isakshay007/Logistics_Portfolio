server:
  port: 8081

spring:
  application:
    name: shipment-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8888}
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASS}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: shipment_service
        format_sql: true
  flyway:
    enabled: true
    schemas: shipment_service
    default-schema: shipment_service
    create-schemas: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    properties:
      security.protocol: ${KAFKA_SECURITY_PROTOCOL:PLAINTEXT}
      sasl.mechanism: ${KAFKA_SASL_MECHANISM:PLAIN}
      sasl.jaas.config: ${KAFKA_SASL_JAAS:}
    producer:
      properties:
        max.block.ms: ${KAFKA_MAX_BLOCK_MS:5000}
        delivery.timeout.ms: ${KAFKA_DELIVERY_TIMEOUT_MS:10000}
        request.timeout.ms: ${KAFKA_REQUEST_TIMEOUT_MS:5000}
  cache:
    type: ${SPRING_CACHE_TYPE:simple}

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  swagger-ui:
    enabled: true
  api-docs:
    enabled: true
